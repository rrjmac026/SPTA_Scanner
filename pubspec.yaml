name: spta_scanner_app
description: SPTA Payment Verification System for Schools
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  mobile_scanner: ^5.2.3
  sqflite: ^2.3.3+1
  path_provider: ^2.1.4
  path: ^1.9.0
  intl: ^0.19.0
  # Excel export
  excel: ^4.0.6
  # PDF export
  pdf: ^3.11.3
  printing: ^5.13.2
  # Share / open files
  share_plus: ^10.1.4
  open_filex: ^4.5.0
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  google_sign_in: ^7.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
